<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueMart</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .navbar {
      background-color: #1a56db;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
    }

    .navbar-logo {
      background-color: #fff;
      color: #1a56db;
      font-weight: 800;
      font-size: 1.1rem;
      padding: 4px 12px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .navbar-links {
      display: flex;
      gap: 8px;
      list-style: none;
    }

    .navbar-links a {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 6px 18px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .navbar-links a:hover,
    .navbar-links a.active {
      background-color: rgba(255, 255, 255, 0.18);
    }

    .navbar-icons {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .navbar-icons a {
      color: #fff;
      font-size: 1.25rem;
    }

    .page-content {
      max-width: 1100px;
      margin: 36px auto;
      padding: 0 24px;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="navbar-logo">BlueMart</span>
    <ul class="navbar-links">
      <li><a href="buy.html">Buy</a></li>
      <li><a href="borrow.html">Borrow</a></li>
      <li><a href="sell.html">Sell</a></li>
    </ul>
    <div class="navbar-icons">
      <a href="cart.html">&#128722;</a>
      <a href="profile.html">&#128100;</a>
    </div>
  </nav>

  <main class="page-content">

  </main>

</body>
</html>
